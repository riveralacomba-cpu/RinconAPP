name: Build Flet APK
on: [push] # Se ejecutará cada vez que subas algo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install SDKs
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk

      - name: Install dependencies
        run: |
          pip install flet firebase-admin

      - name: Build APK
        run: |
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: el-rincon-app
          path: build/apk/*.apk
